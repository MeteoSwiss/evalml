description: |
  Evaluate skill of finetuned models with different encoder configurations: KNN or Cutoff edges.

dates:
  start: 2025-01-01T00:00
  end: 2025-06-20T00:00
  frequency: 54h
  # # or
  # - 2024-01-01T12:00
  # - 2024-02-01T18:00
  # - 2024-03-01T00:00


runs:
  - forecaster:
      inference_resources: 
          slurm_partition: normal-shared
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/233b1274e79b4bfea98378d196a8aba0
      label: stage_C_realch1
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@b9aaee5df86614cad9d8d08b76876a4be4e980db

  - forecaster:
      inference_resources: 
          slurm_partition: normal-shared
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/6a802a47a6b54dcea4711c1a792d36c4
      label: stage_C_realch1_cutoff_edges
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@b9aaee5df86614cad9d8d08b76876a4be4e980db

  - forecaster:
      inference_resources: 
          slurm_partition: normal-shared
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/48375b4b4ee8480f836e5869114e2292
      label: stage_C_icon_1km_cutoff_edges_KNN_5_dec
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@b9aaee5df86614cad9d8d08b76876a4be4e980db


baselines:
  - baseline:
      baseline_id: ICON-CH1-EPS
      label: ICON-CH1-ctrl
      root: /scratch/mch/cmerker/ICON-CH1-EPS
      steps: 0/33/6
  
  - baseline:
      baseline_id: ICON-CH2-EPS
      label: ICON-CH2-ctrl
      root: /scratch/mch/cmerker/ICON-CH2-EPS
      steps: 0/120/6


truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

stratification:
  regions:
    - jura
    - mittelland
    - voralpen
    - alpennordhang
    - innerealpentaeler
    - alpensuedseite
  root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517

locations:
  output_root: /scratch/mch/apennino/evalml/output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
  batch_rules:
    plot_forecast_frame: 32
