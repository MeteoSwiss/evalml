# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of a stage A n320 multi-step global model against ERA.

dates:
  start: 2024-01-01T00:00
  end: 2024-07-01T00:00
  frequency: 59h
  # - 2024-01-01T00:00
  # - 2024-06-19T00:00

runs:
  - forecaster:
      checkpoint: /scratch/mch/miccatta/SwissAI_checkpoints/checkpoint_resN320_fr1_st1_in7_out6/a4bae159c2e64af6a749031737bee02e/inference-last.ckpt
      label: resN320_fr1_st1_in7_out6
      steps: 0/120/1
      config: resources/inference/configs/n320-global-multistep-forecaster.yaml
      disable_local_eccodes_definitions: true

  # - forecaster:
  #     checkpoint: /scratch/mch/miccatta/SwissAI_checkpoints/checkpoint_resN320_fr1_st1_in7_out6_rl4/482d4dfa299143e996ec2f6962510738/inference-anemoi-by_step-epoch_005-step_012000.ckpt
  #     label: resN320_fr1_st1_in7_out6_rl4
  #     steps: 0/120/1
  #     config: resources/inference/configs/n320-global-multistep-forecaster.yaml
  #     disable_local_eccodes_definitions: true

  # - forecaster:
  #     checkpoint: /scratch/mch/miccatta/SwissAI_checkpoints/checkpoint_resN320_fr1_st1_in2_out1/406bb2ab927e4f7eb1f5c133b53ddcbc/inference-last.ckpt
  #     label: resN320_fr1_st1_in2_out1
  #     steps: 0/120/1
  #     config: resources/inference/configs/n320-global-multistep-forecaster.yaml
  #     disable_local_eccodes_definitions: true

  # - forecaster:
  #     checkpoint: /scratch/mch/miccatta/SwissAI_checkpoints/checkpoint_resN320_fr1_st1_in4_out3/f64c33bccca74411bb267b02df8723e5/inference-last.ckpt
  #     label: resN320_fr1_st1_in4_out3
  #     steps: 0/120/1
  #     config: resources/inference/configs/n320-global-multistep-forecaster.yaml
  #     disable_local_eccodes_definitions: true

truth:
  label: ERA5-n320
  root: /store_new/mch/msopr/ml/datasets/aifs-ea-an-oper-0001-mars-n320-1979-2024-1h-v2-with-era51.zarr

experiment:
  params:
    - T_2M
    - TD_2M
    - U_10M
    - V_10M
    - TOT_PREC
    - CLCT
  dashboard:
    stratification:
      # - region
      # - init_hour
      - season
  stratification:
    regions: []

showcase:
  params:
    - T_2M
    - SP_10M
    - TOT_PREC
    - CLCT
    - CLCL
    - SSRD
  meteograms:
    enabled: false # Because to Jretrieve credentials
  animations:
    enabled: true
    domains:
      - name: globe
        rotate: false
        hours_per_revolution: 240 # twice the horizon of 120h (it makes half a revolution)
      # - europe
      # # - alps
      # - icon-ch
      # - switzerland

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
