# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of ICON-CH1 single.

dates:
  # start: 2025-01-01T00:00
  # end: 2025-06-20T00:00
  # frequency: 54h
  # or
  - 2025-01-01T00:00
  - 2025-02-01T06:00
  - 2025-03-01T12:00

runs:
  - forecaster:
      checkpoint: https://servicedepl.meteoswiss.ch/mlstore#/experiments/409/runs/b30acf68520a4bbd8324c44666561696
      label: stage_C_icon_1km
      steps: 0/120/6
      config: resources/inference/configs/sgm-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - earthkit-utils<0.2.0
        - earthkit-data<0.19.0
        - git+https://github.com/ecmwf/anemoi-inference.git@de4cc0decd47dd593d2bb04cf9247e57a216d3cd

  - baseline:
      label: ICON-CH1-ctrl
      root: /store_new/mch/msopr/osm/ICON-CH1-EPS
      steps: 0/33/6

  - baseline:
      label: ICON-CH2-ctrl
      root: /store_new/mch/msopr/osm/ICON-CH2-EPS
      steps: 0/120/6

truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

experiment:
  params:
    - T_2M
    - TD_2M
    - U_10M
    - V_10M
    - TOT_PREC
  stratification:
    regions:
      - jura
      - mittelland
      - voralpen
      - alpennordhang
      - innerealpentaeler
      - alpensuedseite
    root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517
  thresholds:
    TOT_PREC:
      gt: [0.0, 1, 5]
    U_10M:
      gt: [2.5, 5.0, 10.0]
    V_10M:
      gt: [2.5, 5.0, 10.0]
    T_2M:
      lt: [273.15]
      gt: [288.15, 298.15]
  dashboard:
    stratification:
      # - init_hour
      # - region
      - season
  score_maps:
    params:
      - T_2M
      # - TD_2M
      # - U_10M
      # - V_10M
      # - SP_10M
      # - PS
      # - PMSL
      # - TOT_PREC
    leadtimes: [6, 24]
    # Or, to compute every available leadtime from runs+baselines:
    # leadtimes: "all"
    scores:
      - BIAS
      # - RMSE
      # - MAE
    regions:
      - switzerland
      # - centraleurope
    seasons:
      - all
      # - DJF
      # - MAM
      # - JJA
      # - SON
    init_hours:
      - all
      # - "00"
      # - "06"
      # - "12"
      # - "18"

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
