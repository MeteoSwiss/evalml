# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of ICON-CH1 single.

dates:
#  start: 2024-01-01T00:00
#  end: 2024-01-02T00:00
#  frequency: 6h
  - 2025-03-27T06:00


runs:
  - forecaster:
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/c30490b6ba064e4db03b430f3a2595ad
      label: stage_E
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@e369b1a90313e9701db13f63364a467aa281cf36

  # - forecaster:
  #     checkpoint: https://huggingface.co/met-no/bris_cloudy-skies/blob/main/2025-10/cloudy-skies-2025-10.ckpt
  #     label: bris-cloudy-skies
  #     steps: 0/120/6
  #     config: resources/inference/configs/sgm-forecaster-global-ich1.yaml
  #     disable_local_eccodes_definitions: true
  #     extra_requirements:
  #       - earthkit-utils<0.2.0
  #       - earthkit-data<0.19.0
  #       - git+https://github.com/ecmwf/anemoi-inference.git@main

  - baseline:
      label: ICON-CH2-EPS
      root: /store_new/mch/msopr/ml/ICON-CH2-EPS
      steps: 0/120/6

truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

stratification:
  regions:
    - jura
    - mittelland
    - voralpen
    - alpennordhang
    - innerealpentaeler
    - alpensuedseite
  root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517

showcase:
  params:
    - T_2M
    - SP_10M
    - TOT_PREC
  meteograms:
    enabled: false
    stations: [JUN] #, COV, GOR, WFJ, SAE, SAM, DAV, ZER, ANT, VSBAS, BRT, LTB, GOS, CEV, BIA]
  animations:
    enabled: true
    domains:
      - europe
      - switzerland
      - globe
#      - name: alpine_arc
#        extent: [3.0, 17.0, 43.5, 48.5]
#        projection: orthographic
    speed: 10  # simulated hours per second
thresholds:
  TOT_PREC:
    gt: [0.0, 0.001, 0.005]
  U_10M:
    gt: [2.5, 5.0, 10.0]
  V_10M:
    gt: [2.5, 5.0, 10.0]
  T_2M:
    lt: [273.15]
    gt: [288.15, 298.15]

dashboard:
  stratification:
    # - init_hour
    # - region
    - season

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
  batch_rules:
    plot_forecast_frame: 32
