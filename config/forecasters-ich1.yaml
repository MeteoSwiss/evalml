# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of ICON-CH1 single.

dates:
  start: 2024-01-01T00:00
  end: 2024-01-02T00:00
  frequency: 6h

runs:
  - forecaster:
      checkpoint: https://servicedepl.meteoswiss.ch/mlstore#/experiments/409/runs/b30acf68520a4bbd8324c44666561696
      label: stage_C_icon_1km
      steps: 0/120/6
      config: resources/inference/configs/sgm-forecaster-global-ich1.yaml
      extra_requirements:
        - earthkit-utils<0.2.0
        - earthkit-data<0.19.0
        - git+https://github.com/ecmwf/anemoi-inference.git@de4cc0decd47dd593d2bb04cf9247e57a216d3cd

  - forecaster:
      checkpoint: /scratch/mch/apennino/output/checkpoint/973b78b8b39543949abc2b154c5f98d9/inference-last.ckpt
      label: stage_C_icon_1km_hidden_11
      steps: 0/120/6
      config: resources/inference/configs/sgm-forecaster-global-ich1.yaml
      extra_requirements:
        - earthkit-utils<0.2.0
        - earthkit-data<0.19.0
        - git+https://github.com/ecmwf/anemoi-inference.git@de4cc0decd47dd593d2bb04cf9247e57a216d3cd

  # - forecaster:
  #     checkpoint: https://huggingface.co/met-no/bris_cloudy-skies/blob/main/2025-10/cloudy-skies-2025-10.ckpt
  #     label: bris-cloudy-skies
  #     steps: 0/120/6
  #     config: resources/inference/configs/sgm-forecaster-global-ich1.yaml
  #     disable_local_eccodes_definitions: true
  #     extra_requirements:
  #       - earthkit-utils<0.2.0
  #       - earthkit-data<0.19.0
  #       - git+https://github.com/ecmwf/anemoi-inference.git@main

  - baseline:
      label: ICON-CH2-EPS
      root: /store_new/mch/msopr/osm/ICON-CH2-EPS
      steps: 0/120/6

truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

experiment:
  params:
    - T_2M
    - TD_2M
    - U_10M
    - V_10M
    - TOT_PREC
  stratification:
    regions:
      - jura
      - mittelland
      - voralpen
      - alpennordhang
      - innerealpentaeler
      - alpensuedseite
    root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517
  thresholds:
    TOT_PREC:
      gt: [0.0, 1, 5]
    U_10M:
      gt: [2.5, 5.0, 10.0]
    V_10M:
      gt: [2.5, 5.0, 10.0]
    T_2M:
      lt: [273.15]
      gt: [288.15, 298.15]
  dashboard:
    stratification:
      # - init_hour
      # - region
      - season

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50

