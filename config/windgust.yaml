# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Showcase the multi-output "realv2" anemoi architecture (ICON-CH1 cutout forecaster
  with a diagnostic VMAX_10M stream on the REAL-CH1 / ICON-CH1 1km grid).

# Explicit init times for case studies / showcases.
dates:
  - 2024-02-01T00:00

runs:
  - forecaster:
      # Verified-working checkpoint for the realv2 multi-output architecture.
      # Replace with an MLflow run URL/ID once the checkpoint is registered.
      checkpoint: /scratch/mch/rradev/output/checkpoint/9efa01f8c7464328897edb2c03a407c2/inference-last.ckpt
      label: realv2_vmax10m
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-realv2-ich1.yaml
      extra_requirements:
        # anemoi-inference fork = upstream main + two fixes this multi-output
        # checkpoint needs: (1) EmptyInput.create_input_state propagates the date
        # (else KeyError 'date' in add_initial_forcings_to_input_state for the
        # diagnostic-only realv2 stream), and (2) format_dataset_name preserves the
        # {time:04}/{step:03} padding in GRIB output paths.
        - git+https://github.com/radiradev/anemoi-inference.git@fix/empty-input-propagate-date
        - eccodes==2.39.1
        - eccodes-cosmo-resources-python==2.38.3.1

  - baseline:
      label: ICON-CH1-ctrl
      root: /store_new/mch/msopr/osm/ICON-CH1-EPS
      steps: 0/33/6

truth:
  label: REAL-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-realch1-fdb-1km-2005-2025-1h-pl13-v2.0.zarr

experiment:
  params:
    - VMAX_10M
  stratification:
    regions:
      - jura
      - mittelland
      - voralpen
      - alpennordhang
      - innerealpentaeler
      - alpensuedseite
    root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517
  thresholds:
    VMAX_10M:
      gt: [10.0, 20.0, 30.0]
  dashboard:
    stratification:
      - season

# Showcase (animation) settings. VMAX_10M (max 10m wind) is the diagnostic from the
# realv2 output stream, defined only over the Alpine LAM domain -> restrict the showcase
# domains to Switzerland / ICON-CH so every param (including VMAX_10M) stays on-grid.
showcase:
  params:
    - T_2M
    - SP_10M
    - VMAX_10M
  meteograms:
    enabled: false
    stations: [JUN]
  animations:
    enabled: true
    domains:
      - icon-ch
      - switzerland

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
  batch_rules:
    plot_forecast_frame: 32
