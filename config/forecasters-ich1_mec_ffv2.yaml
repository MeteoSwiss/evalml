# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of Varda-single-1.0 against ground observations.

config_label: varda-single-1.0

dates:
  start: 2025-08-01T00:00
  end: 2025-08-05T00:00
  frequency: 30h

runs:
  - forecaster:
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/9f4626a7562a4eb49700aaaaa8607230
      label: icon_1km_hierarchical_2_level_proc_from_scratch
      steps: 0/48/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - anemoi-inference==0.11.1
  - baseline:
      label: ICON-CH1-CTRL
      root: /store_new/mch/msopr/osm/ICON-CH1-EPS
      steps: 0/33/6

truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

#truth:
#  label: SwissMetNet
#  root: jretrievedwh:1,2
  # To verify against SwissMetNet observations from the DWH via jretrievedwh,
  # set instead (requires jretrievedwh.py on $PATH and $OPR_HOME set):
  # Other selectors: root: jretrievedwh:locations=ARO,KLO,LUG
  #                  root: jretrievedwh:bbox=45.8,47.8,5.9,10.5
  #                  append ;stage=devt to target a non-prod DWH stage

experiment:
  params:
    - T_2M
    - TD_2M
    - U_10M
    - V_10M
    - TOT_PREC
  stratification:
    regions:
      - icon-ch1: [1.5, 16, 43, 49.5]
      - jura
    root: /store_new/mch/msopr/ml/regions/Prognoseregionen_LV95_20220517
  thresholds:
    TOT_PREC:
      gt: [0.0, 1, 5]
    U_10M:
      gt: [2.5, 5.0, 10.0]
    V_10M:
      gt: [2.5, 5.0, 10.0]
    T_2M:
      lt: [273.15]
      gt: [288.15, 298.15]
  dashboard:
    stratification:
      # - region
      # - init_hour
      - season
  scoremaps:
    enabled: false

locations:
  output_root: output/

mec:
  ekf_root: /store_new/mch/msopr/osm/KENDA-CH1/EKF
  mon_synop_root: /scratch/mch/paa/mec/MEC_ML_input/monFiles2025
  ver_synop_root: /scratch/mch/paa/mec/MEC25_I-CH1

ffv2:
  experiment_ids: Varda
  experiment_description: Varda-Single_suboro
  file_description: exp_Varda-Single_2025
  domain_table: /users/paa/01_store/02_FFV2/data/8_CH_box
  blacklists: /users/paa/01_store/02_FFV2/data/blacklist
  veri_ens_member: -1
  catthresholds:
    T2M: [282.0, 292.0]
    TD2M: [260.0, 273.0]
    RH2M: [0.9, 1.0]
    U10M: [5.0, 10.0]
    V10M: [5.0, 10.0]
    PS: [100000.0, 101000.0]
    RR_6h: [5.0, 10.0]
  pecthresholds:
    T2M:
      lower: 263.0
      upper: 273.0
    TD2M:
      lower: 273.0
      upper: 283.0
    RH2M:
      lower: 0.9
      upper: 1.0
    U10M:
      lower: 2.0
      upper: 7.0
    V10M:
      lower: 2.0
      upper: 7.0
    PS:
      lower: 100000.0
      upper: 101000.0
    RR_6h:
      lower: 10.0
      upper: 50.0

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
    slurm_account: s83
  jobs: 50
