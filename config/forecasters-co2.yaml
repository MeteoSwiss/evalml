# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of COSMO-E emulator (M-1 forecaster).

dates:
  - 2020-02-03T00:00 # Storm Petra
  - 2020-02-07T00:00 # Storm Sabine
  - 2020-10-01T00:00 # Storm Brigitte

runs:
  - forecaster:
      checkpoint: https://mlflow.ecmwf.int/#/experiments/103/runs/d0846032fc7248a58b089cbe8fa4c511
      label: M-1 forecaster
      steps: 0/120/6
      config: resources/inference/configs/sgm-forecaster-global_trimedge.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@0.8.3

  - baseline:
      label: COSMO-E
      root: /store_new/mch/msopr/ml/COSMO-E
      steps: 0/120/6

truth:
  label: COSMO KENDA
  root: /scratch/mch/fzanetta/data/anemoi/datasets/mch-co2-an-archive-0p02-2015-2020-6h-v3-pl13.zarr

stratification:
  regions:
    - jura
    - mittelland
    - voralpen
    - alpennordhang
    - innerealpentaeler
    - alpensuedseite
  root: /scratch/mch/bhendj/regions/Prognoseregionen_LV95_20220517

thresholds:
  TOT_PREC:
    gt: [0.0, 0.001, 0.005]
  U_10M:
    gt: [2.5, 5.0, 10.0]
  V_10M:
    gt: [2.5, 5.0, 10.0]
  T_2M:
    lt: [273.15]
    gt: [288.15, 298.15]

dashboard:
  stratification:
    # - init_hour
    # - region
    - season

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
  batch_rules:
    plot_forecast_frame: 32

score_maps:
  params:
    - T_2M
    # - TD_2M
    # - U_10M
    # - V_10M
    # - SP_10M
    # - PS
    # - PMSL
    # - TOT_PREC
  leadtimes:
    - 24
  metrics:
    - BIAS
    # - RMSE
    # - MAE
  regions:
    - switzerland
    # - centraleurope
  seasons:
    - all
    # - DJF
    # - MAM
    # - JJA
    # - SON
  init_hours:
    - all
    # - "00"
    # - "06"
    # - "12"
    # - "18"
