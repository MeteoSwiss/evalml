# yaml-language-server: $schema=../workflow/tools/config.schema.json
description: |
  Evaluate skill of Stage C with cutoff edges trained with and without subgrid orography - vs real.

dates:
  start: 2024-01-01T00:00
  end: 2025-01-01T00:00
  frequency: 30h


runs:
  - forecaster:
      inference_resources: 
          slurm_partition: normal-shared
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/6a802a47a6b54dcea4711c1a792d36c4
      label: stage_C_realch1_cutoff_edges
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@b9aaee5df86614cad9d8d08b76876a4be4e980db

  - forecaster:
      inference_resources: 
          slurm_partition: normal-shared
      checkpoint: https://service.meteoswiss.ch/mlstore#/experiments/602/runs/a69e95db4b494679ab20440f8540a835
      label: stage_C_icon_1km_cutoff_edges_subgrid_horography
      steps: 0/120/6
      config: resources/inference/configs/sgm-multidataset-forecaster-global-ich1-oper.yaml
      extra_requirements:
        - git+https://github.com/ecmwf/anemoi-inference.git@b9aaee5df86614cad9d8d08b76876a4be4e980db

