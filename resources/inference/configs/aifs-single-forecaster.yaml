input: test

allow_nans: true

patch_metadata:
  config:
    dataloader:
      test:
        dataset: /store_new/mch/msopr/ml/datasets/aifs-od-an-oper-0001-mars-n320-2016-2025-6h-v1-combined-land.zarr

post_processors:
  - accumulate_from_start_of_forecast:
      accumulations:
        - tp
  - forward_transform_filter:
      rescale:
        scale: 1000 # convert units from m to kg m-2
        offset: 0
        param: tp

output:
  grib:
    path: grib/{date}{time:04}_{step:03}.grib

write_initial_state: true
