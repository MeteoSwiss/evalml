# yaml-language-server: $schema=../../../workflow/tools/config.schema.json
description: |
  Integration-test fixture: minimal experiment run exercising the score-map
  pipeline (verification_scoremaps.py + plot_scoremaps.mo.py). Baseline data
  only (no inference), gridded zarr truth, two init times so season/init-hour
  stratification is populated. Driven by tests/integration/test_experiment.py.
config_label: scoremaps-test

# Two init times (00 and 12 UTC on the same day) so the init-hour buckets '00'
# and '12' both receive samples and the score maps aggregate over more than one
# reference time. Both are DJF, so only that season bucket is populated.
dates:
  start: 2024-01-01T00:00
  end: 2024-01-01T12:00
  frequency: 12h

# Baseline only: ICON-CH2-CTRL is the control member (000) of the ICON-CH2-EPS
# archive. Score-map lead times must be producible from `steps`; 0/6/6 yields
# {0, 6}, so the configured leadtime of 6 h is valid.
runs:
  - baseline:
      label: ICON-CH2-CTRL
      root: /store_new/mch/msopr/osm/ICON-CH2-EPS
      steps: 0/6/6

# Score maps require a gridded (zarr) analysis, not station observations.
truth:
  label: KENDA-CH1
  root: /store_new/mch/msopr/ml/datasets/mch-ich1-1km-2024-2025-1h-pl13-v1.0.zarr

experiment:
  params:
    - T_2M
  stratification:
    regions: []
  dashboard:
    stratification:
      - season
  scoremaps:
    enabled: true
    params:
      - T_2M
    leadtimes:
      - 6
    scores:
      - BIAS
      - RMSE
      - MAE
    regions:
      - switzerland
    seasons:
      - all
      - DJF
    init_hours:
      - all
      - "00"
      - "12"

locations:
  output_root: output/

profile:
  executor: slurm
  global_resources:
    gpus: 16
  default_resources:
    slurm_partition: "postproc"
    cpus_per_task: 1
    mem_mb_per_cpu: 1800
    runtime: "1h"
    gpus: 0
  jobs: 50
