# Tier-2 coverage config for longtest (integration) runs.
#
# The longtests drive the full snakemake subprocess chain
#   pytest -> `evalml` CLI -> snakemake -> `python workflow/scripts/*.py`
# (the leaf scripts, and often whole rules, run in separate processes -- and
# under the `slurm` executor, in separate SLURM jobs). In-process coverage
# cannot see them, so we use coverage.py subprocess mode:
#
#   * parallel = true            -> every process writes its own .coverage.<id>
#   * COVERAGE_PROCESS_START set  -> the a1_coverage.pth startup hook (installed
#                                    in the venv by coverage/pytest-cov) calls
#                                    coverage.process_startup() in each child
#   * pytest-cov combines the data files and reports at session end
#
# Kept out of the default config-discovery path (.coveragerc / pyproject) on
# purpose so it does NOT affect the fast Tier-1 (src-only) run. Use it via
# ci/run-longtest-coverage.sh.
[run]
parallel = true
sigterm = true
relative_files = true
source_pkgs =
    evalml
    verification
    data_input
    plotting
source =
    workflow/scripts

[report]
show_missing = true
skip_empty = true
